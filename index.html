<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>丸子の数字花园</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

 <style>
 :root {
 --bg-color: #fdfbf7;
 --text-color: #3d3d3d;
 --accent-color: #e07a5f;
 }
 .dark {
 --bg-color: #1a1a2e;
 --text-color: #e0e0e0;
 --accent-color: #f67280;
 }
 body {
 font-family: 'Noto Sans SC', sans-serif;
 background-color: var(--bg-color);
 color: var(--text-color);
 transition: background-color 0.5s ease, color 0.5s ease;
 }
 .font-handwriting { font-family: 'Ma Shan Zheng', cursive; }

 .ambient-light {
 position: fixed;
 top: -50%;
 left: -50%;
 width: 200%;
 height: 200%;
 background: radial-gradient(circle at 30% 30%, rgba(224, 122, 95, 0.1) 0%, transparent 50%),
 radial-gradient(circle at 70% 70%, rgba(247, 183, 49, 0.08) 0%, transparent 50%);
 z-index: -1;
 animation: moveLight 20s infinite alternate ease-in-out;
 }
 @keyframes moveLight {
 0% { transform: translate(0, 0); }
 100% { transform: translate(10%, 10%); }
 }

 .sticker-card {
 background: var(--bg-color);
 border: 1.5px solid rgba(0,0,0,0.1);
 box-shadow: 8px 8px 0px rgba(0,0,0,0.08);
 transition: all 0.3s cubic-bezier(.25,.46,.45,.94);
 transform-style: preserve-3d;
 perspective: 1000px;
 cursor: pointer;
 }
 .sticker-card:hover {
 transform: translateY(-5px) rotateX(5deg) rotateY(5deg);
 box-shadow: 12px 12px 0px rgba(0,0,0,0.12);
 }
 .tape {
 position: absolute;
 top: -15px;
 left: 50%;
 transform: translateX(-50%) rotate(-5deg);
 width: 60px;
 height: 30px;
 background: rgba(255,255,255,0.7);
 border: 1px dashed rgba(0,0,0,0.2);
 z-index: 10;
 }
 .dark .tape { background: rgba(255,255,255,0.1); }

 .mood-note {
 position: absolute;
 bottom: 10px;
 right: 10px;
 padding: 4px 8px;
 background: #fffacd;
 color: #333;
 font-size: 12px;
 transform: rotate(3deg);
 box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
 opacity: 0;
 transition: opacity 0.3s;
 }
 .sticker-card:hover .mood-note { opacity: 1; }

 .typewriter::after {
 content: '|';
 animation: blink 1s infinite;
 }
 @keyframes blink {
 0%, 100% { opacity: 1; }
 50% { opacity: 0; }
 }

 #particle-canvas {
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 z-index: -2;
 opacity: 0.6;
 }
 </style>
</head>
<body class="min-h-screen">
 <canvas id="particle-canvas"></canvas>
 <div class="ambient-light"></div>

 <header class="sticky top-0 z-50 backdrop-blur-md" style="background-color: rgba(var(--bg-color-rgb), 0.8);">
 <div class="container mx-auto px-6 py-4 flex justify-between items-center">
 <div class="flex items-center space-x-3">
 <i class="fas fa-seedling text-2xl" style="color: var(--accent-color);"></i>
 <span class="font-handwriting text-2xl">丸子の数字花园</span>
 </div>
 <div class="flex items-center space-x-4">
 <a href="https://github.com/chachaer815" target="_blank" class="text-xl hover:scale-110 transition-transform" style="color: var(--accent-color);">
 <i class="fab fa-github"></i>
 </a>
 <span id="clock" class="text-sm hidden md:block"></span>
 <button id="theme-toggle" class="w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-transform" style="background-color: var(--accent-color); color: white;">
 <i class="fas fa-moon"></i>
 </button>
 </div>
 </div>
 </header>

 <main class="container mx-auto px-4 sm:px-6 pb-20">
 <section class="py-16 text-center">
 <h1 class="font-handwriting text-5xl md:text-7xl mb-4" style="color: var(--accent-color);">你好呀，丸子。</h1>
 <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto leading-relaxed">
 这里是你的代码宇宙，记录那些闪闪发光的灵感～
 </p>
 </section>

 <section class="mb-12">
 <div class="flex justify-center flex-wrap gap-3">
 <button class="filter-btn px-5 py-2 rounded-full border-2 border-gray-300 dark:border-gray-600 hover:border-accent-color hover:text-accent-color transition active" data-filter="all">全部</button>
 <button class="filter-btn px-5 py-2 rounded-full border-2 border-gray-300 dark:border-gray-600 hover:border-accent-color hover:text-accent-color transition" data-filter="tools">🛠️ 实用工具</button>
 <button class="filter-btn px-5 py-2 rounded-full border-2 border-gray-300 dark:border-gray-600 hover:border-accent-color hover:text-accent-color transition" data-filter="demo">🎮 演示Demo</button>
 </div>
 </section>

 <section id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
 </section>
 </main>

 <script>
 // --- 项目列表 ---
 const allProjects = [
 {
 name: 'CozyPrice 腾讯云版',
 desc: '工业零件价格查询系统',
 url: 'https://chachaer815.github.io/cozyprice-app/',
 icon: '🏭',
 category: 'tools'
 },
 {
 name: 'CozyXinxin 预览台',
 desc: 'CozyXinxin 预览台',
 url: 'https://chachaer815.github.io/yuyuer/CozyXinxin/',
 icon: '💖',
 category: 'demo'
 },
 {
 name: '火锅计算器',
 desc: '火锅计算器',
 url: 'https://chachaer815.github.io/yuyuer/zhufugui-huoguo-calculator/',
 icon: '🍲',
 category: 'demo'
 }
 ];

 // --- 初始化 ---
 renderCards();
 const themeToggle = document.getElementById('theme-toggle');
 function applyTheme(theme) {
 if (theme === 'dark') {
 document.documentElement.classList.add('dark');
 themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
 } else {
 document.documentElement.classList.remove('dark');
 themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
 }
 }
 themeToggle.addEventListener('click', () => {
 const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
 localStorage.setItem('theme', newTheme);
 applyTheme(newTheme);
 });
 applyTheme(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

 // --- 时钟 ---
 const clockEl = document.getElementById('clock');
 function updateClock() {
 const now = new Date();
 clockEl.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
 }
 setInterval(updateClock, 1000);
 updateClock();

 // --- 渲染卡片 ---
 const grid = document.getElementById('projects-grid');
 function renderCards(filter = 'all') {
 grid.innerHTML = '';
 const filtered = filter === 'all' ? allProjects : allProjects.filter(p => p.category === filter);
 filtered.forEach((proj, index) => {
 const card = document.createElement('a');
 card.href = proj.url;
 card.target = '_blank';
 card.className = 'sticker-card relative rounded-3xl p-6 block';
 card.style.animationDelay = `${index * 0.1}s`;
 card.innerHTML = `
 <div class="tape"></div>
 <div class="text-5xl mb-4">${proj.icon}</div>
 <h3 class="font-handwriting text-3xl mb-2" style="color: var(--accent-color);">${proj.name}</h3>
 <p class="text-gray-600 dark:text-gray-400 mb-4">${proj.desc}</p>
 <div class="mood-note">${proj.mood}</div>
 `;
 grid.appendChild(card);
 });
 }

 // --- 筛选器 ---
 document.querySelectorAll('.filter-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', '!border-accent-color', '!text-accent-color'));
 btn.classList.add('active', '!border-accent-color', '!text-accent-color');
 renderCards(btn.dataset.filter);
 });
 });

 // --- 背景粒子 ---
 const canvas = document.getElementById('particle-canvas');
 const ctx = canvas.getContext('2d');
 let particles = [];
 function initParticles() {
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
 particles = Array.from({ length: 50 }, () => ({
 x: Math.random() * canvas.width,
 y: Math.random() * canvas.height,
 r: Math.random() * 2 + 1,
 dx: Math.random() * 0.5 - 0.25,
 dy: Math.random() * 0.5 - 0.25
 }));
 }
 function animateParticles() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 const isDark = document.documentElement.classList.contains('dark');
 ctx.fillStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.1)';
 particles.forEach(p => {
 ctx.beginPath();
 ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
 ctx.fill();
 p.x += p.dx;
 p.y += p.dy;
 if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
 if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
 });
 requestAnimationFrame(animateParticles);
 }
 window.addEventListener('resize', initParticles);
 initParticles();
 animateParticles();

 // --- 初始化 ---
 renderCards();
 </script>
</body>
</html>
